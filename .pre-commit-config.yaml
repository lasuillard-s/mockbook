fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        language: system
        types: [shell]
        entry: uv run --frozen shellcheck

      - id: ruff-check
        name: ruff check
        language: system
        types: [python]
        entry: uv run --frozen ruff check
        args: [--fix]

      - id: shfmt
        name: shfmt
        language: system
        types: [shell]
        entry: uv run --frozen shfmt
        args: [--write]

      - id: ruff-format
        name: ruff format
        language: system
        types: [python]
        entry: uv run --frozen ruff format

      - id: mypy
        name: mypy
        language: system
        types: [python]
        pass_filenames: false
        entry: uv run --frozen mypy
        args: [--show-error-codes, --pretty, .]
