name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_FROZEN: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true

      - name: Install deps
        run: uv sync

      - name: Format check (shfmt)
        run: uv run shfmt --diff $(git ls-files '*.sh')

      - name: Lint (shellcheck)
        run: uv run shellcheck $(git ls-files '*.sh')

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy --show-error-codes --pretty .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: local-test:no-publish
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: |
          ./test/bats/bin/bats --verbose-run ./test
